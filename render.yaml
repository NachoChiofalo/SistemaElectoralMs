# Render Blueprint - Sistema Electoral Microservicios
# Docs: https://docs.render.com/blueprint-spec

services:
  # Auth Service
  - type: web
    name: auth-service
    runtime: docker
    plan: free
    dockerfilePath: ./services/auth-service/Dockerfile
    dockerContext: ./services/auth-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "24h"
      - key: REFRESH_TOKEN_EXPIRATION
        value: "7d"

  # Padron Service
  - type: web
    name: padron-service
    runtime: docker
    plan: free
    dockerfilePath: ./services/padron-service/Dockerfile
    dockerContext: ./services/padron-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false

  # API Gateway (punto de entrada publico, incluye web-admin embebido)
  - type: web
    name: gateway-service
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: AUTH_SERVICE_URL
        sync: false
      - key: PADRON_SERVICE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
