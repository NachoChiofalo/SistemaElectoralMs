# Render Blueprint - Sistema Electoral Microservicios
# Docs: https://docs.render.com/blueprint-spec

databases:
  - name: sistema-electoral-db
    plan: free
    databaseName: sistema_electoral
    user: electoral_user
    postgresMajorVersion: "15"

services:
  # Auth Service (privado - solo accesible internamente)
  - type: web
    name: auth-service
    runtime: docker
    plan: free
    dockerfilePath: ./services/auth-service/Dockerfile
    dockerContext: ./services/auth-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-electoral-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "24h"
      - key: REFRESH_TOKEN_EXPIRATION
        value: "7d"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: gateway-service
          property: hostport
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: gateway-service
          property: hostport

  # Padron Service (privado - solo accesible internamente)
  - type: web
    name: padron-service
    runtime: docker
    plan: free
    dockerfilePath: ./services/padron-service/Dockerfile
    dockerContext: ./services/padron-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-electoral-db
          property: connectionString
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: gateway-service
          property: hostport
      - key: FRONTEND_URL
        fromService:
          type: web
          name: gateway-service
          property: hostport
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: gateway-service
          property: hostport

  # Web Admin (sitio estatico)
  - type: web
    name: web-admin
    runtime: docker
    plan: free
    dockerfilePath: ./clients/web-admin/Dockerfile
    dockerContext: ./clients/web-admin
    envVars:
      - key: PORT
        value: "3000"

  # API Gateway (publico - punto de entrada)
  - type: web
    name: gateway-service
    runtime: docker
    plan: free
    dockerfilePath: ./services/gateway-service/Dockerfile
    dockerContext: ./services/gateway-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: AUTH_SERVICE_URL
        fromService:
          type: web
          name: auth-service
          property: hostport
      - key: PADRON_SERVICE_URL
        fromService:
          type: web
          name: padron-service
          property: hostport
      - key: WEB_ADMIN_URL
        fromService:
          type: web
          name: web-admin
          property: hostport
      - key: JWT_SECRET
        fromService:
          type: web
          name: auth-service
          envVarKey: JWT_SECRET
