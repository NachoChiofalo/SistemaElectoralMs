<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistema Electoral - Administración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="src/styles/design-system.css">
    <link rel="stylesheet" href="src/styles/navbar-styles.css">
    <link rel="stylesheet" href="src/styles/padron-styles.css">
    <link rel="stylesheet" href="src/styles/detalle-votante-styles.css">
    <link rel="stylesheet" href="src/styles/login-styles.css">
    <style>
        /* Touch-friendly improvements */
        .nav-btn, .logout-btn {
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0.1);
        }

        /* Accessibility improvements */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .nav-btn, .logout-btn {
                border: 2px solid currentColor;
            }
        }

        body {
            font-family: var(--ds-font-family, 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif);
            background-color: var(--ds-bg-page, #f8fafc);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .app-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Padron navigation buttons */
        .padron-nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .padron-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--ds-font-family, inherit);
            transition: all 0.3s ease;
            font-size: 14px;
            border: none;
        }

        .padron-nav-btn-back {
            background: var(--ds-bg-subtle, #f1f5f9);
            color: var(--ds-text-secondary, #475569);
            border: 1px solid var(--ds-border-default, #cbd5e1);
        }

        .padron-nav-btn-back:hover {
            background: var(--ds-secondary-200, #e2e8f0);
            border-color: var(--ds-border-strong, #94a3b8);
            transform: translateY(-1px);
        }

        .padron-nav-btn-results {
            background: var(--ds-gradient-primary, linear-gradient(135deg, #6366f1, #a855f7));
            color: white;
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.25);
        }

        .padron-nav-btn-results:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        @media (max-width: 768px) {
            .padron-nav-buttons {
                flex-direction: column;
                gap: 8px;
            }
            .padron-nav-btn {
                width: 100%;
                justify-content: center;
                padding: 12px 16px;
                min-height: 44px;
            }
        }
    </style>
</head>
<body>

    <!-- Barra de navegación unificada -->
    <div id="navbar-container"></div>

    <main class="app-main" role="main">
        <!-- Sección de Padrón Electoral -->
        <section id="padron" class="section active" role="region" aria-label="Gestión de Padrón Electoral">
            <!-- Botón de acceso a Resultados -->
            <div class="padron-nav-buttons">
                <button onclick="window.location.href='dashboard.html'" class="padron-nav-btn padron-nav-btn-back">
                    <i class="fas fa-arrow-left"></i>
                    <span class="btn-text">Volver al Dashboard</span>
                </button>

                <button onclick="window.location.href='resultados.html'" class="padron-nav-btn padron-nav-btn-results">
                    <i class="fas fa-chart-pie"></i>
                    <span class="btn-text">Ver Resultados</span>
                </button>
            </div>
            
            <div id="padron-container" class="padron-electoral-container">
                <!-- El contenido será generado por JavaScript -->
            </div>
        </section>

        <!-- Secciones futuras -->
        <section id="resultados" class="section" role="region" aria-label="Resultados electorales">
            <div class="coming-soon">
                <i class="fas fa-chart-bar" aria-hidden="true"></i>
                <h2>Módulo de Resultados</h2>
                <p>Este módulo estará disponible próximamente</p>
            </div>
        </section>

        <section id="reportes" class="section" role="region" aria-label="Generación de reportes">
            <div class="coming-soon">
                <i class="fas fa-file-alt" aria-hidden="true"></i>
                <h2>Módulo de Reportes</h2>
                <p>Este módulo estará disponible próximamente</p>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="src/components/NavbarComponent.js"></script>
    <script src="src/services/ApiService.js"></script>
    <script src="src/services/AuthService.js"></script>
    <script src="src/components/LoginComponent.js"></script>
    <script src="src/components/DetalleVotanteComponent.js"></script>
    <script src="src/components/PadronComponent.js"></script>
    <script src="src/app.js"></script>
    <script>
        // Inicializar barra de navegación unificada
        document.addEventListener('DOMContentLoaded', function() {
            if (window.navbarComponent && typeof window.navbarComponent.init === 'function') {
                window.navbarComponent.init('navbar-container', 'padron');
            }
        });
    </script>
</body>
</html>
